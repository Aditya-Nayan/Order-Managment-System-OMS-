version: '3.8'

services:
  db:
    image: postgres:15
    container_name: oms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omspassword}
      POSTGRES_DB: ${POSTGRES_DB:-ordersdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omsuser} -d ${POSTGRES_DB:-ordersdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oms-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://omsuser:omspassword@db:5432/ordersdb}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oms-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
